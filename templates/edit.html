<!DOCTYPE html>
<html>

<head>

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:600px;">

    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">
            Edit Task
        </h2>

        <form method="POST">

            <input
            type="text"
            name="title"
            class="form-control mb-3"
            value="{{ task[1] }}"
            required>

            <textarea
            name="description"
            class="form-control mb-3"
            rows="4">{{ task[2] }}</textarea>

            <select
            name="priority"
            class="form-control mb-3">

                <option value="High"
                {% if task[3]=='High' %}selected{% endif %}>
                High
                </option>

                <option value="Medium"
                {% if task[3]=='Medium' %}selected{% endif %}>
                Medium
                </option>

                <option value="Low"
                {% if task[3]=='Low' %}selected{% endif %}>
                Low
                </option>

            </select>

            <button class="btn btn-primary w-100">
                Update Task
            </button>

        </form>

    </div>

</div>

</body>

</html>
